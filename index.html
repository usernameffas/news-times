<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Times</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📰 News Times</h1>
    <input type="text" id="searchInput" placeholder="키워드 검색...">
    <button id="searchBtn">검색</button>
  </header>

  <nav>
    <button class="category-btn active" data-category="general">전체</button>
    <button class="category-btn" data-category="business">비즈니스</button>
    <button class="category-btn" data-category="entertainment">엔터</button>
    <button class="category-btn" data-category="sports">스포츠</button>
    <button class="category-btn" data-category="technology">테크</button>
    <button class="category-btn" data-category="health">헬스</button>
  </nav>

  <main id="newsContainer"></main>

  <script src="app.js"></script>
</body>
</html>
